{% extends 'layout.html' %}
{% block content %}

<div class="post-container">

    <div class="card post-detail-card p-4">

        <!-- 🔹 Header -->
        <div class="d-flex justify-content-between align-items-start mb-3">

            <div class="d-flex align-items-center">

                <!-- Avatar -->
                <img src="{{ url_for('static', filename='profile_pics/' + post.author.image_file) }}"
                     class="post-avatar me-3">

                <!-- Author -->
                <div>
                    <a class="fw-semibold text-decoration-none post-username"
                       href="{{ url_for('users.user_posts', username=post.author.username) }}">
                        {{ post.author.username }}
                    </a>
                    <div class="text-muted small">
                        {{ post.date_posted.strftime('%b %d, %Y') }}
                    </div>
                </div>

            </div>

            <!-- Actions -->
            {% if post.author == current_user %}
            <div class="d-flex gap-2">
                <a class="btn btn-outline-secondary btn-sm"
                   href="{{ url_for('posts.update_post', post_id=post.id) }}">
                   Edit
                </a>

                <button type="button"
                        class="btn btn-outline-danger btn-sm"
                        data-bs-toggle="modal"
                        data-bs-target="#deleteModal">
                    Delete
                </button>
            </div>
            {% endif %}

        </div>

        <!-- 🔹 Title -->
        <h2 class="post-detail-title mb-3">
            {{ post.title }}
        </h2>

        <!-- 🔹 Content -->
        <p class="post-detail-content">
            {{ post.content }}
        </p>

    </div>

</div>


<!-- 🔥 Delete Modal -->
<div class="modal fade" id="deleteModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">

            <div class="modal-header">
                <h5 class="modal-title">Delete Post?</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>

            <div class="modal-body">
                Are you sure you want to delete this post?
            </div>

            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">
                    Cancel
                </button>

                <form action="{{ url_for('posts.delete_post', post_id=post.id) }}" method="POST">
                    <button class="btn btn-danger" type="submit">
                        Delete
                    </button>
                </form>
            </div>

        </div>
    </div>
</div>

{% endblock content %}
